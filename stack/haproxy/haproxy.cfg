global
  log stdout format raw local0

defaults
  log global
  mode http
  option httplog
  timeout connect 5s
  timeout client  50s
  timeout server  50s

frontend fe_http
  bind *:80
  default_backend be_web

backend be_web
  balance roundrobin
  option httpchk GET /
  server web1 web1:80 check
  server web2 web2:80 check
  server web3 web3:80 check

frontend stats
  bind *:8404
  mode http
  stats enable
  stats uri /stats
  stats refresh 5s
